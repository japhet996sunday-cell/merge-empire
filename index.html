<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Merge Empire: Idle Tycoon</title>
  <meta name="description" content="Merge, build, and grow your empire — an idle merge tycoon game." />
  <meta name="theme-color" content="#161425" />

  <!--
    Stylesheet load order matters and is deliberate:
    base       -> resets, custom properties (design tokens), typography
    layout     -> structural/grid positioning of app shell + screens
    components -> reusable component styling (buttons, cards, modal, toast)
    shell      -> app-shell-specific pieces (header, currency bar, nav,
                  loading screen, settings modal, achievement banner)
    animations -> keyframes + transition utility classes
    themes     -> light/dark variable overrides
    responsive -> breakpoint overrides, loaded last so it always wins the cascade
  -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/shell.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
</head>
<body data-theme="system">
  <!-- App shell: main.js owns everything inside #app-root. -->
  <div id="app-root" class="app-root"></div>

  <!--
    Audio unlock gate: browsers block AudioContext until a user gesture.
    main.js listens for a click here to initialize AudioSystem, then
    removes this overlay. Kept in the static HTML shell (rather than
    generated by JS) so it's visible immediately, with zero flash of
    missing UI, even before main.js finishes loading.
  -->
  <div id="audio-unlock-gate" class="audio-unlock-gate" role="button" tabindex="0" aria-label="Tap to enable sound">
    <span>Tap to Play</span>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
    </html>
